<!doctype html><html lang="ko"><head><meta charset="utf-8">
<style>
  :root{ --gold:#d4a843; --gold-d:#b08a35; --ink:#0a0b10; --ivory:#fdfbf7; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:#e7e4dd; font-family:"Malgun Gothic",sans-serif; padding:48px; display:flex; gap:56px; justify-content:center; align-items:flex-start;}
  .stage{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .cap{font-size:14px; color:#5a5448; letter-spacing:.04em;}

  .sticker{ position:relative; width:300px; height:464px; border-radius:26px; overflow:hidden;
    box-shadow:0 18px 40px rgba(0,0,0,.18); }
  .sticker.ivory{ background:var(--ivory); }
  .sticker.black{ background:radial-gradient(120% 90% at 50% 0%, #15161d 0%, #0a0b10 60%); }

  .frame{ position:absolute; inset:11px; border:1.4px solid var(--gold); border-radius:18px; pointer-events:none;}
  .sticker.ivory .frame{ box-shadow: inset 0 0 0 4px rgba(212,168,67,.10); }

  .inner{ position:relative; height:100%; padding:26px 24px 20px; display:flex; flex-direction:column; align-items:center; text-align:center;}
  .logo{ width:46px; height:auto; margin-top:4px; }
  .brand{ font-family:"HANBatang","Batang",serif; font-size:25px; font-weight:700; letter-spacing:.14em; color:#1b1a17; margin-top:7px;}
  .brand.light{ color:var(--ivory); }
  .brandsub{ font-size:9.5px; letter-spacing:.34em; color:var(--gold-d); margin-top:5px; font-weight:600;}
  .brandsub.gold{ color:var(--gold); }
  .divider{ width:34px; height:1.5px; background:var(--gold); margin:13px 0 12px; opacity:.85;}
  .title{ font-family:"HANBatang","Batang",serif; font-size:20px; font-weight:700; color:var(--ink); letter-spacing:.01em; line-height:1.3;}
  .title.light{ color:var(--ivory); }
  .sub{ font-size:11px; color:#8c7c54; margin-top:9px; letter-spacing:.01em;}
  .sub.goldmute{ color:rgba(212,168,67,.78); }

  .qrwrap{ position:relative; margin-top:18px; }
  .qrbox{ width:150px; height:150px; }
  .qr{ width:100%; height:100%; display:block;}
  /* 코너 브래킷 */
  .br{ position:absolute; width:16px; height:16px; border:2px solid var(--gold); }
  .br.tl{ left:-12px; top:-12px; border-right:0; border-bottom:0; border-top-left-radius:6px;}
  .br.tr{ right:-12px; top:-12px; border-left:0; border-bottom:0; border-top-right-radius:6px;}
  .br.bl{ left:-12px; bottom:-12px; border-right:0; border-top:0; border-bottom-left-radius:6px;}
  .br.br2{ right:-12px; bottom:-12px; border-left:0; border-top:0; border-bottom-right-radius:6px;}
  /* 블랙 변형: 아이보리 칩 위에 검정 QR */
  .chip{ background:var(--ivory); padding:13px; border-radius:16px; box-shadow:0 6px 18px rgba(0,0,0,.35);}

  .scanhint{ font-size:10.5px; color:#9a8c66; margin-top:15px; letter-spacing:.02em;}
  .scanhint.gold{ color:rgba(212,168,67,.85);}
  .foot{ margin-top:auto; font-size:10px; letter-spacing:.22em; color:var(--gold-d); font-weight:600; display:flex; flex-direction:column; align-items:center; gap:9px;}
  .foot.gold{ color:var(--gold);}
  .fline{ width:54px; height:1px; background:var(--gold); opacity:.6;}
</style></head>
